<div th:fragment="rows">
    <div th:if="${error != null}" style="text-align: center; color: #ef4444; padding: 40px; background: #fee2e2; border-radius: 12px; margin-bottom: 20px;">
        <p style="font-weight: 600;">Error: <span th:text="${error}"></span></p>
    </div>
    
    <div th:if="${response != null}" class="results-box">
        <div class="table-wrap">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th style="width: 35%;">Post Content</th>
                        <th style="width: 15%;">Account</th>
                        <th>Type</th>
                        <th>Likes</th>
                        <th>Comments</th>
                        <th>Published</th>
                        <th>Sentiment</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Empty State Row -->
                    <tr th:if="${#lists.isEmpty(response.posts)}">
                        <td colspan="8" style="text-align: center; color: var(--text-muted); padding: 80px;">
                            <div style="font-size: 40px; margin-bottom: 15px; opacity: 0.3;">🚫</div>
                            <div style="font-size: 18px; font-weight: 600;">No posts found for this hashtag</div>
                            <div style="font-size: 14px; margin-top: 8px;">Try searching for a different trend or keyword.</div>
                        </td>
                    </tr>

                    <!-- Data Rows -->
                    <tr th:each="post, stat : ${response.posts}" class="video-row">
                        <td style="font-weight: 700; color: #94a3b8; font-size: 13px;" th:text="${stat.count}">1</td>
                        <td>
                            <div class="title-cell" th:text="${post.caption}" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; max-width: 500px;">Caption</div>
                            <div style="margin-top: 8px;">
                                <a th:href="${post.url}" target="_blank" class="tweet-link-btn" style="text-decoration: none; font-size: 12px; padding: 4px 10px;">↗ View on Instagram</a>
                            </div>
                        </td>
                        <td>
                            <div class="channel-info">
                                <div class="channel-icon" th:text="${#strings.isEmpty(post.username) ? '?' : #strings.substring(post.username,0,1).toUpperCase()}">U</div>
                                <span th:text="${post.username}" style="font-weight: 600; color: var(--text-main);">user</span>
                            </div>
                        </td>
                        <td>
                            <span th:if="${post.type == 'REEL'}" style="font-size: 12px; font-weight: 600; color: #8b5cf6; background: #ede9fe; padding: 4px 10px; border-radius: 100px;">REEL</span>
                            <span th:if="${post.type != 'REEL'}" style="font-size: 12px; font-weight: 600; color: #0ea5e9; background: #e0f2fe; padding: 4px 10px; border-radius: 100px;">POST</span>
                        </td>
                        <td><span style="font-weight: 600; color: #ef4444;" th:text="${post.likes}">0</span></td>
                        <td><span style="font-weight: 600; color: #10b981;" th:text="${post.comments}">0</span></td>
                        <td class="duration-tag" th:text="${post.timestamp}">N/A</td>
                        <td>
                            <span th:if="${post.sentiment == 'positive'}" style="font-size: 12px; font-weight: 600; color: #15803d; background: #dcfce7; padding: 4px 10px; border-radius: 100px;">Positive</span>
                            <span th:if="${post.sentiment == 'negative'}" style="font-size: 12px; font-weight: 600; color: #b91c1c; background: #fee2e2; padding: 4px 10px; border-radius: 100px;">Negative</span>
                            <span th:if="${post.sentiment == 'neutral' || post.sentiment == null}" style="font-size: 12px; font-weight: 600; color: #475569; background: #e2e8f0; padding: 4px 10px; border-radius: 100px;">Neutral</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</html>
