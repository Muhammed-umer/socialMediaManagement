<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<!-- Row fragment returned by HTMX partial requests -->
<th:block th:fragment="rows">

    <!-- Empty state when no videos found -->
    <tr th:if="${#lists.isEmpty(videos)}">
        <td colspan="9">
            <div style="padding: 60px 24px; text-align: center; color: #94a3b8;">
                <div style="font-size: 40px; margin-bottom: 12px; opacity: 0.5;">🔍</div>
                <p style="font-size: 16px; font-weight: 600; color: #475569; margin-bottom: 4px;">No videos found for this keyword</p>
                <p style="font-size: 13px;">Try another search or check back later</p>
            </div>
        </td>
    </tr>

    <!-- Video rows -->
    <tr th:each="v, iterStat : ${videos}" 
        class="video-row"
        th:attr="data-thumb=${v.thumbnailUrl}, data-url='https://www.youtube.com/watch?v=' + ${v.id}">

        <!-- Serial Number -->
        <td th:text="${iterStat.count}" style="font-weight: 700; color: #94a3b8; font-size: 13px;"></td>

        <!-- Title: Visible and Clickable -->
        <td>
            <div class="title-cell"
                 th:text="${v.title}"
                 th:title="${v.title}">
            </div>
        </td>

        <!-- Channel -->
        <td>
            <div class="channel-info">
                <div class="channel-icon"
                     th:text="${v.channel != null and v.channel.length() > 0 ? v.channel.substring(0,1).toUpperCase() : '?'}">
                </div>
                <span th:text="${v.channel}"></span>
            </div>
        </td>

        <!-- Type -->
        <td>
            <span class="views-tag" th:text="${v.contentType != null ? v.contentType : 'Video'}"></span>
        </td>

        <!-- Views -->
        <td>
            <span class="views-tag">
                <span th:if="${v.views != null and v.views >= 1000000}"
                      th:text="${#numbers.formatDecimal(v.views / 1000000.0, 1, 1) + 'M'}"></span>
                <span th:if="${v.views != null and v.views >= 1000 and v.views < 1000000}"
                      th:text="${#numbers.formatDecimal(v.views / 1000.0, 1, 1) + 'K'}"></span>
                <span th:if="${v.views != null and v.views < 1000}"
                      th:text="${v.views}"></span>
                <span th:if="${v.views == null}">—</span>
            </span>
        </td>

        <!-- Duration (HH:MM:SS) -->
        <td class="duration-tag">
            <span th:with="total=${v.duration != null ? v.duration : 0},
                           hrs=${total >= 3600 ? total / 3600 : 0},
                           mins=${(total % 3600) / 60},
                           secs=${total % 60}">
                <span th:text="${(hrs > 0 ? (hrs + ':') : '') + ((hrs > 0 and mins < 10) ? '0' + mins : mins) + ':' + (secs < 10 ? '0' : '') + secs}"></span>
            </span>
        </td>

        <!-- Published Date -->
        <td th:text="${v.publishedDateFormatted}" style="color: #64748b; font-size: 13px;"></td>

        <!-- Sentiment -->
        <td>
            <span th:if="${v.sentiment == 'positive'}" style="background: #ecfdf5; color: #059669; padding: 4px 10px; border-radius: 100px; font-weight: 600; font-size: 12px; display: inline-block; text-align: center; width: 70px;">Positive</span>
            <span th:if="${v.sentiment == 'negative'}" style="background: #fef2f2; color: #dc2626; padding: 4px 10px; border-radius: 100px; font-weight: 600; font-size: 12px; display: inline-block; text-align: center; width: 70px;">Negative</span>
            <span th:if="${v.sentiment == 'neutral' or v.sentiment == null}" style="background: #f1f5f9; color: #475569; padding: 4px 10px; border-radius: 100px; font-weight: 600; font-size: 12px; display: inline-block; text-align: center; width: 70px;">Neutral</span>
        </td>

        <!-- Summary -->
        <td style="position: relative;" class="summary-cell">
            <style>
                .summary-cell { position: relative; }
                .summary-text { max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; color: #475569; cursor: help; }
                .custom-tooltip { visibility: hidden; opacity: 0; position: absolute; bottom: 100%; left: 0; transform: translateY(-8px); background: #1e293b; color: #f8fafc; padding: 12px; border-radius: 8px; width: max-content; max-width: 400px; white-space: normal; z-index: 1000; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); font-size: 13px; transition: all 0.2s ease-in-out; pointer-events: none; line-height: 1.5; text-align: left; }
                .custom-tooltip::after { content: ''; position: absolute; top: 100%; left: 24px; border-width: 6px; border-style: solid; border-color: #1e293b transparent transparent transparent; }
                .summary-cell:hover .custom-tooltip { visibility: visible; opacity: 1; transform: translateY(0); pointer-events: auto; }
            </style>
            <div class="summary-text" th:text="${v.summary != null ? v.summary : 'No summary'}"></div>
            <!-- Custom Tooltip -->
            <div class="custom-tooltip" th:if="${v.summary != null}">
                <strong style="color: #94a3b8; display: block; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;">Detailed Summary (English)</strong>
                <span th:text="${v.summary}"></span>
            </div>
        </td>

    </tr>

</th:block>

</body>
</html>
