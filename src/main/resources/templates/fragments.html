<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<!-- Row fragment returned by HTMX partial requests -->
<th:block th:fragment="rows">

    <!-- Empty state when no videos found -->
    <tr th:if="${#lists.isEmpty(videos)}">
        <td colspan="7">
            <div style="padding: 60px 24px; text-align: center; color: #94a3b8;">
                <div style="font-size: 40px; margin-bottom: 12px; opacity: 0.5;">🔍</div>
                <p style="font-size: 16px; font-weight: 600; color: #475569; margin-bottom: 4px;">No videos found for this keyword</p>
                <p style="font-size: 13px;">Try another search or check back later</p>
            </div>
        </td>
    </tr>

    <!-- Video rows -->
    <tr th:each="v, iterStat : ${videos}" 
        class="video-row"
        th:attr="data-thumb=${v.thumbnailUrl}, data-url='https://www.youtube.com/watch?v=' + ${v.id}">

        <!-- Serial Number -->
        <td th:text="${iterStat.count}" style="font-weight: 700; color: #94a3b8; font-size: 13px;"></td>

        <!-- Title: Visible and Clickable with Summary Button -->
        <td>
            <div class="title-cell"
                 th:text="${v.title}"
                 th:title="${v.title}">
            </div>
            <div style="margin-top: 8px;">
                <button 
                   onclick="event.stopPropagation(); const el = this.parentElement.nextElementSibling; el.style.display = el.style.display === 'none' ? 'block' : 'none';" 
                   style="cursor: pointer; background: #0f172a; color: white; border: none; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;">
                   Toggle AI Summary
                </button>
            </div>
            <div style="display: none; margin-top: 10px; padding: 12px; background: #f8fafc; border-left: 4px solid #ef4444; border-radius: 4px; font-size: 13px; color: #334155; line-height: 1.5;"
                 th:text="${v.aiSummary != null ? v.aiSummary : 'No evaluation available.'}">
            </div>
        </td>

        <!-- Channel -->
        <td>
            <div class="channel-info">
                <div class="channel-icon"
                     th:text="${v.channel != null and v.channel.length() > 0 ? v.channel.substring(0,1).toUpperCase() : '?'}">
                </div>
                <span th:text="${v.channel}"></span>
            </div>
        </td>

        <!-- AI Analysis (Sentiment Only) -->
        <td>
            <span th:if="${v.sentiment == 'Positive'}" class="views-tag" style="background: #dcfce7; color: #15803d;">Positive</span>
            <span th:if="${v.sentiment == 'Negative'}" class="views-tag" style="background: #fee2e2; color: #b91c1c;">Negative</span>
            <span th:if="${v.sentiment == 'Neutral' or v.sentiment == null}" class="views-tag" style="background: #f1f5f9; color: #475569;">Neutral</span>
        </td>

        <!-- Views -->
        <td>
            <span class="views-tag">
                <span th:if="${v.views != null and v.views >= 1000000}"
                      th:text="${#numbers.formatDecimal(v.views / 1000000.0, 1, 1) + 'M'}"></span>
                <span th:if="${v.views != null and v.views >= 1000 and v.views < 1000000}"
                      th:text="${#numbers.formatDecimal(v.views / 1000.0, 1, 1) + 'K'}"></span>
                <span th:if="${v.views != null and v.views < 1000}"
                      th:text="${v.views}"></span>
                <span th:if="${v.views == null}">—</span>
            </span>
        </td>

        <!-- Published Date -->
        <td th:text="${v.publishedDateFormatted}" style="color: #64748b; font-size: 13px;"></td>

        <!-- Published Ago -->
        <td th:text="${v.publishedAgo}" style="font-weight: 700; color: #0f172a; font-size: 13px;"></td>

    </tr>

</th:block>

</body>
</html>
